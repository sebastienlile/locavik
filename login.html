<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="strict-origin-when-cross-origin">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>Locavik — Connexion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', system-ui, sans-serif;
  background: linear-gradient(135deg, #0A0A14 0%, #1A0A12 50%, #0F0A1A 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.auth-card {
  background: #fff;
  border-radius: 24px;
  padding: 48px;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 28px 80px rgba(0,0,0,0.4);
}

.auth-brand {
  text-align: center;
  margin-bottom: 32px;
}

.auth-logo {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-family: 'Bricolage Grotesque', sans-serif;
  font-weight: 800;
  font-size: 1.5rem;
  color: #1A1705;
  margin-bottom: 6px;
  text-decoration: none;
}

.auth-logo em { color: #8B1A3A; font-style: normal; }

.auth-tagline {
  font-size: .82rem;
  color: #6B6550;
}

.auth-tabs {
  display: flex;
  gap: 4px;
  background: #F0EDE4;
  padding: 4px;
  border-radius: 12px;
  margin-bottom: 28px;
}

.auth-tab {
  flex: 1;
  padding: 9px;
  border: none;
  background: none;
  border-radius: 9px;
  font-family: 'DM Sans', sans-serif;
  font-size: .875rem;
  font-weight: 600;
  color: #6B6550;
  cursor: pointer;
  transition: all .2s;
}

.auth-tab.active {
  background: #fff;
  color: #1A1705;
  box-shadow: 0 1px 6px rgba(26,23,5,.1);
}

.form-group { margin-bottom: 14px; }

.form-label {
  display: block;
  font-size: .76rem;
  font-weight: 600;
  color: #1A1705;
  margin-bottom: 5px;
}

.form-input {
  width: 100%;
  padding: 11px 15px;
  border: 1.5px solid rgba(26,23,5,.12);
  border-radius: 10px;
  font-size: .93rem;
  font-family: 'DM Sans', sans-serif;
  color: #1A1705;
  background: #fff;
  outline: none;
  transition: all .22s;
}

.form-input:focus {
  border-color: #8B1A3A;
  box-shadow: 0 0 0 3px rgba(139,26,58,.1);
}

.form-input::placeholder { color: rgba(26,23,5,.28); }

.btn-submit {
  width: 100%;
  padding: 14px;
  background: #8B1A3A;
  color: #fff;
  border: none;
  border-radius: 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all .22s;
  margin-top: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.btn-submit:hover { background: #6B1229; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(139,26,58,.35); }
.btn-submit:disabled { opacity: .5; cursor: not-allowed; transform: none; box-shadow: none; }

.auth-error {
  background: #FEF2F2;
  border: 1px solid #FECACA;
  color: #DC2626;
  font-size: .82rem;
  font-weight: 500;
  padding: 10px 14px;
  border-radius: 10px;
  margin-bottom: 12px;
  display: none;
}

.back-link {
  display: block;
  text-align: center;
  margin-top: 20px;
  font-size: .82rem;
  color: #6B6550;
  text-decoration: none;
  transition: color .2s;
}
.back-link:hover { color: #1A1705; }

.forgot-link {
  display: block;
  text-align: right;
  font-size: .78rem;
  color: #6B6550;
  margin-top: -6px;
  margin-bottom: 14px;
  cursor: pointer;
  transition: color .2s;
  background: none; border: none; font-family: 'DM Sans', sans-serif;
}
.forgot-link:hover { color: #8B1A3A; text-decoration: underline; }

.auth-success {
  background: #F0FDF4;
  border: 1px solid #BBF7D0;
  color: #166534;
  font-size: .82rem;
  font-weight: 500;
  padding: 10px 14px;
  border-radius: 10px;
  margin-bottom: 12px;
  display: none;
}

@media (max-width: 480px) {
  .auth-card { padding: 32px 24px; }
}
</style>
</head>
<body>

<div class="auth-card">
  <div class="auth-brand">
    <a href="/" class="auth-logo">
      <svg width="32" height="32" viewBox="0 0 30 30" fill="none">
        <rect width="30" height="30" rx="9" fill="#8B1A3A"/>
        <path d="M15 7L23 12V23H7V12L15 7Z" stroke="white" stroke-width="1.6" stroke-linejoin="round" fill="none"/>
        <rect x="12" y="17" width="6" height="6" rx="1.2" fill="white"/>
        <circle cx="15" cy="13" r="1.6" fill="white"/>
      </svg>
      Loca<em>vik</em>
    </a>
    <div class="auth-tagline">Gestion locative simplifiée</div>
  </div>

  <div class="auth-tabs">
    <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Se connecter</button>
    <button class="auth-tab" id="tabRegister" onclick="switchTab('register')">Créer un compte</button>
  </div>

  <!-- REGISTER -->
  <div id="formRegister" style="display:none">
    <div id="registerError" class="auth-error"></div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" class="form-input" id="registerEmail" placeholder="votre@email.com" maxlength="254" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">Mot de passe</label>
      <input type="password" class="form-input" id="registerPassword" placeholder="Min. 6 caractères" maxlength="128" autocomplete="new-password">
    </div>
    <div class="form-group">
      <label class="form-label">Confirmer le mot de passe</label>
      <input type="password" class="form-input" id="registerConfirm" placeholder="••••••••" maxlength="128" autocomplete="new-password">
    </div>
    <button class="btn-submit" id="registerBtn" onclick="doRegister()">Créer mon compte →</button>
  </div>

  <!-- LOGIN -->
  <div id="formLogin">
    <div id="loginError" class="auth-error"></div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="text" class="form-input" id="loginEmail" placeholder="votre@email.com" maxlength="254" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">Mot de passe</label>
      <input type="password" class="form-input" id="loginPassword" placeholder="••••••••" maxlength="128" autocomplete="current-password">
    </div>
    <button class="forgot-link" onclick="switchTab('forgot')">Mot de passe oublié ?</button>
    <button class="btn-submit" id="loginBtn" onclick="doLogin()">Se connecter →</button>
  </div>

  <!-- FORGOT PASSWORD -->
  <div id="formForgot" style="display:none">
    <div id="forgotError" class="auth-error"></div>
    <div id="forgotSuccess" class="auth-success"></div>
    <p style="font-size:.84rem;color:#6B6550;margin-bottom:18px;line-height:1.6;">
      Entrez votre adresse email. Nous vous enverrons un lien pour réinitialiser votre mot de passe.
    </p>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" class="form-input" id="forgotEmail" placeholder="votre@email.com">
    </div>
    <button class="btn-submit" id="forgotBtn" onclick="doForgot()">Envoyer le lien →</button>
    <button onclick="switchTab('login')" style="display:block;width:100%;margin-top:12px;padding:10px;background:none;border:none;font-family:'DM Sans',sans-serif;font-size:.84rem;color:#6B6550;cursor:pointer;">← Retour à la connexion</button>
  </div>

  <!-- Nouveau client → Stripe -->
  <p style="text-align:center;font-size:.83rem;color:#6B6550;margin-top:8px;">
    Pas encore de compte ? <a href="/pricing.html" style="color:#8B1A3A;font-weight:600;text-decoration:none;">Choisir un plan →</a>
  </p>

  <a href="/" class="back-link">← Retour à l'accueil</a>
</div>

<script>
// EmailJS — mêmes credentials que dashboard.html
const EMAILJS_PUBLIC_KEY  = 'sZjlWc0aOdDHfzWS_';
const EMAILJS_SERVICE_ID  = 'service_milywv3';
// Créer ce template dans EmailJS (voir instructions ci-dessous)
const EMAILJS_TEMPLATE_ADMIN = 'template_admin_alert';

emailjs.init({ publicKey: EMAILJS_PUBLIC_KEY });

// Envoie une alerte silencieuse à noreply@locavik.com lors d'une inscription
async function sendAdminAlert(userEmail) {
  try {
    const res = await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ADMIN, {
      user_email:  userEmail,
      to_email:    'sebastien95360@gmail.com',
      signup_date: new Date().toLocaleString('fr-FR', {
        timeZone: 'Europe/Paris',
        day: '2-digit', month: '2-digit', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
      }),
      admin_url: 'https://locavik.com/admin.html',
    });
    console.log('[AdminAlert] Email envoyé, statut:', res.status, res.text);
  } catch (err) {
    console.error('[AdminAlert] Échec envoi email:', err);
  }
}

const firebaseConfig = {
  apiKey: "AIzaSyBYQCBTpHuEKeqRw4JRA2bEGRX32jHof14",
  authDomain: "locavik-98512.firebaseapp.com",
  projectId: "locavik-98512",
  storageBucket: "locavik-98512.firebasestorage.app",
  messagingSenderId: "876858414320",
  appId: "1:876858414320:web:f858cfe1265ae9a4129e35"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

firebase.auth().onAuthStateChanged((user) => {
  if (user) window.location.href = '/dashboard.html';
});

function switchTab(tab) {
  const isLogin = tab === 'login';
  const isForgot = tab === 'forgot';
  document.getElementById('formLogin').style.display = isLogin ? 'block' : 'none';
  document.getElementById('formRegister').style.display = (!isLogin && !isForgot) ? 'block' : 'none';
  document.getElementById('formForgot').style.display = isForgot ? 'block' : 'none';
  document.getElementById('tabLogin').classList.toggle('active', isLogin);
  document.getElementById('tabRegister').classList.toggle('active', !isLogin && !isForgot);
  ['loginError','registerError','forgotError','forgotSuccess'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = 'none';
  });
  if (isForgot) {
    const lv = document.getElementById('loginEmail').value;
    if (lv && lv.includes('@')) document.getElementById('forgotEmail').value = lv;
  }
}

async function doForgot() {
  const btn = document.getElementById('forgotBtn');
  const email = normalizeEmail(document.getElementById('forgotEmail').value);
  document.getElementById('forgotError').style.display = 'none';
  document.getElementById('forgotSuccess').style.display = 'none';
  if (!email) { showError('forgotError', '', 'Veuillez entrer votre adresse email.'); return; }
  btn.disabled = true; btn.textContent = 'Envoi…';
  try {
    // SÉCURITÉ: On envoie directement sans vérifier si le compte existe au préalable
    // (fetchSignInMethodsForEmail révèle l'existence d'un compte — énumération d'emails)
    await firebase.auth().sendPasswordResetEmail(email);
    const el = document.getElementById('forgotSuccess');
    el.textContent = 'Si un compte existe pour cette adresse, un lien de réinitialisation vient d\'être envoyé. Vérifiez votre boîte mail (et les spams).';
    el.style.display = 'block';
    btn.textContent = 'Email envoyé ✓';
  } catch(e) {
    // SÉCURITÉ: Message générique pour ne pas révéler si l'email existe ou non
    const msg = (e.code === 'auth/invalid-email') ? ERRORS['auth/invalid-email'] : 'Si un compte existe pour cette adresse, un email vient d\'être envoyé.';
    showError('forgotError', '', msg);
    btn.disabled = false; btn.textContent = 'Envoyer le lien →';
  }
}

function normalizeEmail(input) {
  const val = input.trim();
  if (val.toLowerCase() === 'sebadmin') return 'sebadmin@locavik.com';
  return val;
}

const ERRORS = {
  'auth/user-not-found': 'Aucun compte associé à cette adresse email.',
  'auth/invalid-email': 'Adresse email invalide.',
  'auth/wrong-password': 'Mot de passe incorrect.',
  'auth/invalid-credential': 'Email ou mot de passe incorrect.',
  'auth/too-many-requests': 'Trop de tentatives. Réessayez dans quelques minutes.',
  'auth/email-already-in-use': 'Un compte existe déjà avec cet email.',
  'auth/weak-password': 'Mot de passe trop faible (6 caractères minimum).',
  'auth/missing-email': 'Veuillez entrer votre adresse email.',
};

function showError(id, code, msg) {
  const el = document.getElementById(id);
  el.textContent = ERRORS[code] || msg;
  el.style.display = 'block';
}

async function doLogin() {
  const btn = document.getElementById('loginBtn');
  const email = normalizeEmail(document.getElementById('loginEmail').value);
  const pwd = document.getElementById('loginPassword').value;
  document.getElementById('loginError').style.display = 'none';
  if (!email || !pwd) { showError('loginError', '', 'Veuillez remplir tous les champs.'); return; }
  btn.disabled = true; btn.textContent = 'Connexion…';
  try {
    await firebase.auth().signInWithEmailAndPassword(email, pwd);
    window.location.href = '/dashboard.html';
  } catch(e) {
    showError('loginError', e.code, e.message);
    btn.disabled = false; btn.textContent = 'Se connecter →';
  }
}

async function doRegister() {
  const btn = document.getElementById('registerBtn');
  const email = document.getElementById('registerEmail').value.trim();
  const pwd = document.getElementById('registerPassword').value;
  const confirm = document.getElementById('registerConfirm').value;
  document.getElementById('registerError').style.display = 'none';
  if (!email || !pwd) { showError('registerError', '', 'Veuillez remplir tous les champs.'); return; }
  if (pwd !== confirm) { showError('registerError', '', 'Les mots de passe ne correspondent pas.'); return; }
  btn.disabled = true; btn.textContent = 'Création…';
  try {
    const cred = await firebase.auth().createUserWithEmailAndPassword(email, pwd);
    await db.collection('users').doc(cred.user.uid).set({
      email,
      createdAt: new Date().toISOString(),
      intended_plan: 'starter',
    }, { merge: true });
    await sendAdminAlert(email); // attendre avant de quitter la page sinon la requête est annulée
    window.location.href = '/dashboard.html';
  } catch(e) {
    showError('registerError', e.code, e.message);
    btn.disabled = false; btn.textContent = 'Créer mon compte →';
  }
}

document.addEventListener('keydown', (e) => {
  if (e.key !== 'Enter') return;
  const isLogin = document.getElementById('formLogin').style.display !== 'none';
  if (isLogin) doLogin(); else doRegister();
});

// Auto-switch vers l'onglet inscription si ?register dans l'URL
if (new URLSearchParams(window.location.search).has('register')) {
  switchTab('register');
}
</script>
</body>
</html>
